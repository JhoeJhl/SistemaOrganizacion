services:
  - type: web
    name: estudios-io
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn -b 0.0.0.0:$PORT run:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: "sqlite:///database.db"
