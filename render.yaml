services:
  - type: web
    name: estudios-io
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn run:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: estudios-db
          property: connectionString

databases:
  - name: estudios-db
    plan: free
