<!-- Overlay de Modales -->
<div id="modalOverlay" class="fixed inset-0 bg-gray-950/80 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
    
    <!-- Modal de Login -->
    <div id="loginModal" class="w-full max-w-md bg-gray-900 rounded-2xl shadow-2xl border border-gray-800 overflow-hidden hidden animate-in zoom-in-95 duration-200">
        <div class="p-8">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-white tracking-tight">Iniciar Sesión</h2>
                    <p class="text-gray-400 mt-1 text-sm">Ingresa a tu cuenta de Estudios.io</p>
                </div>
                <button onclick="closeModals()" class="text-gray-500 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">Usuario</label>
                    <input type="text" name="username" required
                        class="w-full px-4 py-3 bg-gray-950 border border-gray-800 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">Contraseña</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-3 bg-gray-950 border border-gray-800 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 px-4 rounded-xl transition-all shadow-lg shadow-indigo-500/25">
                    Entrar al Sistema
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-500">¿No tienes cuenta? 
                    <button onclick="switchModal('register')" class="text-indigo-400 hover:text-indigo-300 font-medium">Regístrate</button>
                </p>
            </div>
        </div>
    </div>

    <!-- Modal de Registro -->
    <div id="registerModal" class="w-full max-w-md bg-gray-900 rounded-2xl shadow-2xl border border-gray-800 overflow-hidden hidden animate-in zoom-in-95 duration-200">
        <div class="p-8">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-white tracking-tight">Crea tu cuenta</h2>
                    <p class="text-gray-400 mt-1 text-sm">Únete a Estudios.io hoy</p>
                </div>
                <button onclick="closeModals()" class="text-gray-500 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">Nombre de Usuario</label>
                    <input type="text" name="username" required
                        class="w-full px-4 py-3 bg-gray-950 border border-gray-800 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">Contraseña</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-3 bg-gray-950 border border-gray-800 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">Confirmar Contraseña</label>
                    <input type="password" name="confirm_password" required
                        class="w-full px-4 py-3 bg-gray-950 border border-gray-800 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 px-4 rounded-xl transition-all shadow-lg shadow-indigo-500/25">
                    Crear Cuenta
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-500">
                ¿Ya tienes cuenta? 
                <button onclick="switchModal('login')" class="text-indigo-400 hover:text-indigo-300 font-medium">Inicia sesión</button>
            </div>
        </div>
    </div>
</div>

<script>
    function openModal(type) {
        document.getElementById('modalOverlay').classList.remove('hidden');
        document.getElementById('modalOverlay').classList.add('flex');
        document.body.style.overflow = 'hidden';
        
        if(type === 'login') {
            document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('registerModal').classList.add('hidden');
        } else {
            document.getElementById('registerModal').classList.remove('hidden');
            document.getElementById('loginModal').classList.add('hidden');
        }
    }

    function closeModals() {
        document.getElementById('modalOverlay').classList.add('hidden');
        document.getElementById('modalOverlay').classList.remove('flex');
        document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('registerModal').classList.add('hidden');
        document.body.style.overflow = 'auto';
    }

    function switchModal(type) {
        if(type === 'login') {
            document.getElementById('registerModal').classList.add('hidden');
            document.getElementById('loginModal').classList.remove('hidden');
        } else {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('registerModal').classList.remove('hidden');
        }
    }

    // Cerrar al hacer click en el overlay
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModals();
    });
</script>
