<!-- Overlay de Modales -->
<div id="modalOverlay" class="fixed inset-0 bg-gray-950/90 backdrop-blur-md z-[100] hidden items-center justify-center p-4">
    
    <!-- Modal de Login -->
    <div id="loginModal" class="w-full max-w-lg bg-gray-900 rounded-3xl shadow-2xl border border-white/10 overflow-hidden hidden animate-in zoom-in-95 duration-200">
        <div class="p-8 md:p-10">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-white tracking-tight">Iniciar Sesión 👋</h2>
                    <p class="text-gray-400 mt-2 text-sm">Continúa tu camino al éxito</p>
                </div>
                <button onclick="closeModals()" class="text-gray-500 hover:text-white transition-colors bg-white/5 p-2 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            {% include 'components/forms/login_form.html' %}

            <div class="mt-8 pt-6 border-t border-gray-800 text-center">
                <p class="text-sm text-gray-500">¿No tienes cuenta? 
                    <button onclick="switchModal('register')" class="text-indigo-400 hover:text-indigo-300 font-bold transition-colors">Regístrate gratis</button>
                </p>
            </div>
        </div>
    </div>

    <!-- Modal de Registro -->
    <div id="registerModal" class="w-full max-w-lg bg-gray-900 rounded-3xl shadow-2xl border border-white/10 overflow-hidden hidden animate-in zoom-in-95 duration-200">
        <div class="p-8 md:p-10">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-white tracking-tight">Crea tu cuenta 🚀</h2>
                    <p class="text-gray-400 mt-2 text-sm">Únete a Estudios.io hoy mismo</p>
                </div>
                <button onclick="closeModals()" class="text-gray-500 hover:text-white transition-colors bg-white/5 p-2 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            {% include 'components/forms/register_form.html' %}

            <div class="mt-8 pt-6 border-t border-gray-800 text-center text-sm text-gray-500">
                ¿Ya tienes cuenta? 
                <button onclick="switchModal('login')" class="text-indigo-400 hover:text-indigo-300 font-bold transition-colors">Inicia sesión aquí</button>
            </div>
        </div>
    </div>
</div>

<script>
    function openModal(type) {
        document.getElementById('modalOverlay').classList.remove('hidden');
        document.getElementById('modalOverlay').classList.add('flex');
        document.body.style.overflow = 'hidden';
        
        if(type === 'login') {
            document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('registerModal').classList.add('hidden');
        } else {
            document.getElementById('registerModal').classList.remove('hidden');
            document.getElementById('loginModal').classList.add('hidden');
        }
    }

    function closeModals() {
        document.getElementById('modalOverlay').classList.add('hidden');
        document.getElementById('modalOverlay').classList.remove('flex');
        document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('registerModal').classList.add('hidden');
        document.body.style.overflow = 'auto';
    }

    function switchModal(type) {
        if(type === 'login') {
            document.getElementById('registerModal').classList.add('hidden');
            document.getElementById('loginModal').classList.remove('hidden');
        } else {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('registerModal').classList.remove('hidden');
        }
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModals();
    });
</script>
