{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div id="flash-alerts-container" class="fixed top-24 left-1/2 -translate-x-1/2 z-50 space-y-2 max-w-sm w-full px-4 flex flex-col items-center">
            {% for category, message in messages %}
                <div class="p-4 rounded-xl border flex items-start gap-3 shadow-2xl animate-in fade-in zoom-in-95 duration-300 w-full
                    {% if category == 'error' %}
                        bg-red-500/10 border-red-500/50 text-red-400
                    {% elif category == 'success' %}
                        bg-emerald-500/10 border-emerald-500/50 text-emerald-400
                    {% else %}
                        bg-blue-500/10 border-blue-500/50 text-blue-400
                    {% endif %}">
                    <div class="flex-grow text-center text-sm font-medium">
                        {{ message }}
                    </div>
                    <button onclick="this.parentElement.remove()" class="text-current opacity-50 hover:opacity-100 transition-opacity">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            {% endfor %}
        </div>
        
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const alerts = document.querySelectorAll('#flash-alerts-container > div');
                alerts.forEach(alert => {
                    setTimeout(() => {
                        alert.classList.add('animate-out', 'fade-out', 'zoom-out-95', 'duration-300');
                        setTimeout(() => alert.remove(), 300);
                    }, 2000);
                });
            });
        </script>
    {% endif %}
{% endwith %}
