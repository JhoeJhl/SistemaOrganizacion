<!-- Global Confirmation Modal -->
<div id="globalConfirmModal" class="fixed inset-0 bg-gray-950/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
    <div class="w-full max-w-md bg-white dark:bg-gradient-to-br dark:from-gray-900 dark:to-gray-800 rounded-3xl shadow-2xl border border-gray-200 dark:border-white/10 overflow-hidden animate-in zoom-in-95 duration-200 text-gray-900 dark:text-white">
        <div class="p-8 text-center">
            <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </div>
            <h3 id="confirmModalTitle" class="text-xl font-bold mb-2">¿Estás seguro?</h3>
            <p id="confirmModalMessage" class="text-sm text-gray-500 dark:text-gray-400 mb-8">Esta acción no se puede deshacer y se perderán todos los datos relacionados.</p>
            
            <div class="flex gap-3">
                <button type="button" onclick="closeConfirmModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800/50 dark:hover:bg-gray-750 text-gray-700 dark:text-white font-bold py-3.5 rounded-2xl transition-all border border-gray-200 dark:border-gray-700/50">
                    Cancelar
                </button>
                <form id="confirmModalForm" action="" method="POST" class="flex-1">
                    <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3.5 rounded-2xl transition-all shadow-lg shadow-red-500/20 active:scale-95">
                        Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function showConfirmModal(title, message, actionUrl) {
        document.getElementById('confirmModalTitle').innerText = title || '¿Estás seguro?';
        document.getElementById('confirmModalMessage').innerText = message || 'Esta acción no se puede deshacer.';
        document.getElementById('confirmModalForm').action = actionUrl;
        
        const modal = document.getElementById('globalConfirmModal');
        if (modal) {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }
    }
    
    function closeConfirmModal() {
        const modal = document.getElementById('globalConfirmModal');
        if (modal) {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }
    }
    
    // Close on ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeConfirmModal();
    });
</script>
