    <!-- Header/Logo -->
    <div class="p-8">
        <a href="{{ url_for('main.inicio') }}" class="flex items-center gap-4 group">
            <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20 group-hover:scale-110 transition-transform">
                <span class="text-white font-black text-xl">E</span>
            </div>
            <span class="text-2xl font-black text-gray-900 dark:text-white tracking-tighter">Estudios<span class="text-indigo-500">.io</span></span>

        <a href="{{ url_for('main.inicio') }}"

            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            Materias
        </a>

        <a href="{{ url_for('study.list_tasks') }}" 
           class="flex items-center gap-3 px-4 py-3 text-sm font-bold rounded-xl transition-all duration-200 group
           {% if '/study/tasks' in request.path %} bg-indigo-600 text-white shadow-lg shadow-indigo-500/20 {% else %} text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/5 {% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
            </svg>
            Tareas

        <p class="px-4 text-[10px] font-black text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-4 mt-8">Planificación</p>

        <a href="{{ url_for('study.planner') }}" 
           class="flex items-center gap-3 px-4 py-3 text-sm font-bold rounded-xl transition-all duration-200 group
           {% if '/study/planner' in request.path %} bg-indigo-600 text-white shadow-lg shadow-indigo-500/20 {% else %} text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/5 {% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            Planificador
        </a>

        <a href="{{ url_for('study.view_calendar') }}" 
           class="flex items-center gap-3 px-4 py-3 text-sm font-bold rounded-xl transition-all duration-200 group
           {% if '/study/calendar' in request.path %} bg-indigo-600 text-white shadow-lg shadow-indigo-500/20 {% else %} text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/5 {% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            Calendario
        </a>

        <p class="px-4 text-[10px] font-black text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-4 mt-8">Rendimiento</p>

        <a href="{{ url_for('study.view_analytics') }}" 
           class="flex items-center gap-3 px-4 py-3 text-sm font-bold rounded-xl transition-all duration-200 group
           {% if '/study/analytics' in request.path %} bg-indigo-600 text-white shadow-lg shadow-indigo-500/20 {% else %} text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/5 {% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            Progreso
        </a>

        <a href="{{ url_for('study.list_goals') }}" 
           class="flex items-center gap-3 px-4 py-3 text-sm font-bold rounded-xl transition-all duration-200 group
           {% if '/study/goals' in request.path %} bg-indigo-600 text-white shadow-lg shadow-indigo-500/20 {% else %} text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/5 {% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
            </svg>
            Metas
        </a>

        <a href="{{ url_for('study.list_sessions') }}" 
           class="flex items-center gap-3 px-4 py-3 text-sm font-bold rounded-xl transition-all duration-200 group
           {% if '/study/sessions' in request.path %} bg-indigo-600 text-white shadow-lg shadow-indigo-500/20 {% else %} text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/5 {% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Sesiones
        </a>
    </nav>

    <!-- Footer / User Profile -->
    <div class="p-4 border-t border-gray-200 dark:border-white/5 space-y-2">
        <!-- Theme Toggle -->
        <button id="theme-toggle" 
                class="flex items-center justify-between w-full px-4 py-2 text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest bg-gray-100 dark:bg-white/5 rounded-xl hover:bg-gray-200 dark:hover:bg-white/10 transition-all group">
            <span class="flex items-center gap-2">
                <span id="theme-toggle-dark-icon" class="hidden">🌙 Oscuro</span>
                <span id="theme-toggle-light-icon" class="hidden">☀️ Claro</span>
            </span>
            <div class="w-8 h-4 bg-gray-300 dark:bg-gray-700 rounded-full relative transition-colors group-hover:bg-indigo-600">
                <div id="theme-toggle-dot" class="absolute top-1 left-1 w-2 h-2 bg-white rounded-full transition-all"></div>
            </div>
        </button>

        <div class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-white/5 rounded-2xl mb-1">
            <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-black">
                {{ current_user.username[0].upper() }}
            </div>
            <div class="min-w-0">
                <p class="text-sm font-black text-gray-900 dark:text-white truncate">{{ current_user.username }}</p>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">{{ current_user.role.name }}</p>
            </div>
        </div>
        <a href="{{ url_for('auth.logout') }}" 
           class="flex items-center justify-center gap-2 w-full py-3 bg-transparent text-gray-500 dark:text-gray-500 hover:text-red-600 dark:hover:text-red-400 text-xs font-black uppercase tracking-widest transition-all rounded-xl hover:bg-red-50 dark:hover:bg-red-500/10">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Cerrar Sesión
        </a>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        const themeDot = document.getElementById('theme-toggle-dot');

        function updateThemeUI() {
            if (document.documentElement.classList.contains('dark')) {
                lightIcon.classList.remove('hidden');
                darkIcon.classList.add('hidden');
                themeDot.style.left = '1.25rem';
            } else {
                darkIcon.classList.remove('hidden');
                lightIcon.classList.add('hidden');
                themeDot.style.left = '0.25rem';
            }
        }

        updateThemeUI();

        themeToggleBtn.addEventListener('click', function() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
            updateThemeUI();
        });
    </script>
</aside>
