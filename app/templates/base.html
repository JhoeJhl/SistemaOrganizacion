<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de Estudios{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #111827 inset !important;
            -webkit-text-fill-color: white !important;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-full flex flex-col selection:bg-indigo-500/30">

    {% include 'components/navbar.html' %}
    {% include 'components/alerts.html' %}
    {% include 'components/auth_modals.html' %}

    <main class="flex-grow flex flex-col">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'components/footer.html' %}

</body>
</html>
